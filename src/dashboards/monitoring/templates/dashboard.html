<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover lets env(safe-area-inset-*) work on iOS notch / home-indicator -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)" />
  <title>Trading Bot Monitor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/css/dashboard.css" />

  <!-- SRI hashes pin the exact CDN payload; if a CDN is compromised the script
       refuses to execute. crossorigin="anonymous" is required for SRI. -->
  <script crossorigin="anonymous"
          src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
          integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"></script>
  <script crossorigin="anonymous"
          src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
          integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"></script>
  <script crossorigin="anonymous"
          src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"></script>
  <script crossorigin="anonymous"
          src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"
          integrity="sha384-ijk2QwnixVP19l5ENflXHY2/BMo9ANUiTqH6MiVk6i7wp68I6wjNQFOcyayHgClg"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/static/js/dashboard.js"></script>
</body>
</html>
